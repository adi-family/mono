# Trunk build settings for the adi webapp. The `dist/` output is embedded into adi-app,
# which serves it at app.adi — that is the production path.
[build]
target = "index.html"
dist = "dist"

# Watch the webapp AND the shared design system, so editing adi-css SCSS hot-reloads too.
[watch]
watch = [".", "../adi-css/scss"]
ignore = ["dist"]

# `trunk serve` is only for standalone UI iteration. It proxies /api to the adi-app that
# `scripts/dev.sh` starts on :8090 against the isolated ADI_DIR=.adi-dev registry — NOT the
# live control panel on :8000, which runs the installed binary and whatever state is real.
[serve]
addresses = ["127.0.0.1"]
port = 9080

[[proxy]]
rewrite = "/api/"
backend = "http://127.0.0.1:8090/api/"
