[package]
name = "adi-webapp-api"
description = "The wire contract and server handlers for the adi webapp: serde DTO types (compiled everywhere, incl. wasm) plus the /api/* logic over adi-ports-manager behind the `server` feature."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[features]
default = []
# The native-only server side: the /api handlers over the live port registry and mesh
# config. The wasm frontend depends on this crate WITHOUT this feature, so it pulls in only
# the DTO types (never adi-ports-manager or adi-mesh, which do filesystem I/O / link iroh
# and can't target wasm).
server = [
    "dep:adi-config",
    "dep:adi-ports-manager",
    "dep:adi-mesh",
    "dep:adi-projects",
    "dep:adi-tasks",
    "dep:adi-agents",
    "dep:adi-fs",
    "dep:serde_json",
    "dep:serde_yaml_ng",
]

[dependencies]
# The wire types are pure serde — this is the only dependency that reaches wasm.
serde = { workspace = true }

# Server-only: the config store (to locate the global hive.yaml), the live port registry, the
# mesh config/identity/ticket library, the projects registry, JSON, and YAML (to read each
# .adi/hive.yaml for the detail + aggregated-hive views).
adi-config = { workspace = true, optional = true }
adi-ports-manager = { workspace = true, optional = true }
adi-mesh = { workspace = true, optional = true }
adi-projects = { workspace = true, optional = true }
# The task tree store backing the read-only Tasks tab (GET /api/tasks).
adi-tasks = { workspace = true, optional = true }
# The agent-definition store backing the Agents tab (/api/agents*).
adi-agents = { workspace = true, optional = true }
# The base-directory-jailed filesystem backing the project file browser/editor endpoints.
adi-fs = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
serde_yaml_ng = { version = "0.10", optional = true }

[lints]
workspace = true
