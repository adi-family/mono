<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ADI Dashboard</title>
    <style>
      /* Mirrors the adi design-system tokens so a dashboard looks like the rest of adi.
         Kept inline (no external requests); see crates/adi-css/scss/_tokens.scss. */
      :root {
        color-scheme: light dark;
        --bg: #fafafb;
        --panel: #ffffff;
        --ink: #0d0f12;
        --muted: #6b7280;
        --line: #e5e7eb;
        --accent: #0d9488;
        --online: #16a34a;
        --down: #dc2626;
        --shadow: 0 1px 2px rgba(9, 11, 15, .04);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0b0d;
          --panel: #101215;
          --ink: #e9ecf1;
          --muted: #8b919c;
          --line: #23262b;
          --accent: #2dd4bf;
          --online: #34d399;
          --down: #f87171;
          --shadow: 0 1px 2px rgba(0, 0, 0, .3);
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        letter-spacing: -0.006em;
        -webkit-font-smoothing: antialiased;
        font: 13.5px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      header {
        display: flex;
        align-items: baseline;
        gap: 10px;
        flex-wrap: wrap;
        padding: 10px 16px;
        border-bottom: 1px solid var(--line);
      }
      h1 { font-size: 13px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
      .meta {
        color: var(--muted);
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-variant-numeric: tabular-nums;
      }
      .dot {
        display: inline-block; width: 6px; height: 6px; border-radius: 50%;
        background: var(--online); margin-right: 6px; vertical-align: 1px;
      }
      .dot.off { background: var(--down); }
      main {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 12px;
        padding: 16px;
        align-items: start;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 10px 14px 12px;
        overflow-x: auto;
      }
      .panel > h2 {
        margin: 0 0 8px;
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        font-weight: 600;
      }
      /* A module that failed to mount — flagged, but not louder than the working panels. */
      .panel--failed { border-color: color-mix(in srgb, var(--down) 35%, var(--line)); }
      .panel--failed > h2 { color: var(--down); }
      .empty { padding: 20px; color: var(--muted); font-size: 12px; }
      code { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; }
      a { color: var(--accent); }
    </style>
  </head>
  <body>
    <header>
      <h1>ADI Dashboard</h1>
      <span class="meta" id="status"></span>
    </header>
    <main id="app"></main>

    <script type="module">
      // Runtime config injected by frontend/index.ts.
      const config = __ADI_CONFIG__;

      // adi-agent editor launcher — a floating button that opens the control panel's embedded
      // adi-agent chat, scoped to this dashboard, so you can edit its .ts files by chatting with it.
      (() => {
        const btn = document.createElement("button");
        btn.textContent = "✎ edit";
        btn.title = "Edit this dashboard with adi-agent";
        btn.style.cssText =
          "position:fixed;right:14px;bottom:14px;z-index:2147483647;padding:7px 12px;" +
          "border-radius:999px;border:1px solid var(--line);background:var(--panel);" +
          "color:var(--ink);font:600 12px/1 ui-sans-serif,system-ui,sans-serif;cursor:pointer;" +
          "box-shadow:0 2px 8px rgba(0,0,0,.18);";
        btn.addEventListener("click", () => {
          const url =
            "//app.adi/embed/dashboard-agent?dashboard=" + encodeURIComponent(config.dashboard);
          window.open(url, "adi-dashboard-agent", "width=480,height=760");
        });
        document.body.append(btn);
      })();

      const app = document.getElementById("app");
      const status = document.getElementById("status");

      // The backend is a sibling hive service with no proxy host — reached directly by port.
      const api = config.backendPort
        ? `http://127.0.0.1:${config.backendPort}`
        : null;

      /**
       * What every module receives. `api.get`/`api.post` are pre-bound to the backend, so a
       * module never has to know the port; `panel()` gives it a titled card to render into.
       */
      function context(id) {
        return {
          dashboard: config.dashboard,
          api: {
            base: api,
            async get(path) {
              if (!api) throw new Error("backend offline");
              const r = await fetch(api + path);
              if (!r.ok) throw new Error(`${path}: ${r.status}`);
              return r.json();
            },
            async post(path, body) {
              if (!api) throw new Error("backend offline");
              const r = await fetch(api + path, {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify(body),
              });
              if (!r.ok) throw new Error(`${path}: ${r.status}`);
              return r.json();
            },
          },
          panel(title) {
            const el = document.createElement("section");
            el.className = "panel";
            el.innerHTML = `<h2></h2>`;
            el.querySelector("h2").textContent = title ?? id;
            app.append(el);
            const body = document.createElement("div");
            el.append(body);
            return body;
          },
        };
      }

      async function boot() {
        // Report backend reachability up front — a dead backend should be visible, not silent.
        let online = false;
        if (api) {
          try {
            const r = await fetch(api + "/health");
            online = r.ok;
          } catch {}
        }
        status.innerHTML = `<span class="dot ${online ? "" : "off"}"></span>` +
          `${config.dashboard.slice(0, 8)} · ${config.modules.length} module(s) · ` +
          (api ? `backend ${online ? "up" : "down"} :${config.backendPort}` : "no backend");

        if (!config.modules.length) {
          app.innerHTML =
            `<div class="empty">No modules yet. Drop a <code>.ts</code> file into ` +
            `<code>frontend/modules/</code> and reload.</div>`;
          return;
        }

        // Each module is independent: one that throws must not stop the others from mounting.
        for (const id of config.modules) {
          try {
            const mod = await import(`/modules/${id}.js`);
            const mount = mod.default ?? mod.mount;
            if (typeof mount !== "function") {
              throw new Error("module has no default export function");
            }
            await mount(context(id));
          } catch (err) {
            const el = document.createElement("section");
            el.className = "panel panel--failed";
            el.innerHTML = `<h2></h2><code></code>`;
            el.querySelector("h2").textContent = `${id} — failed`;
            el.querySelector("code").textContent = String(err);
            app.append(el);
          }
        }
      }

      boot();
    </script>
  </body>
</html>
