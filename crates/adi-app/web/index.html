<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>adi · control panel</title>
<style>
  /* ---- tokens: light ground, cool-biased neutrals, teal accent ---------------- */
  :root {
    --bg:        #f6f8fa;
    --surface:   #ffffff;
    --surface-2: #f0f3f6;
    --border:    #e4e8ee;
    --ink:       #151a21;
    --muted:     #69727f;
    --accent:    #0e9c92;
    --accent-ink:#0b7d75;
    --on-accent: #ffffff;
    --online:    #16a34a;
    --warn:      #d97706;
    --down:      #dc2626;
    --shadow:    0 1px 2px rgba(16,24,32,.05), 0 6px 20px rgba(16,24,32,.05);
    --radius:    12px;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #0e1217;
      --surface:   #161c23;
      --surface-2: #1c232c;
      --border:    #262f3a;
      --ink:       #e6ebf1;
      --muted:     #8b94a2;
      --accent:    #2dd4bf;
      --accent-ink:#5eead4;
      --on-accent: #06231f;
      --online:    #34d399;
      --warn:      #fbbf24;
      --down:      #f87171;
      --shadow:    0 1px 2px rgba(0,0,0,.4), 0 8px 26px rgba(0,0,0,.35);
    }
  }
  /* explicit toggle wins over the OS preference, both directions */
  :root[data-theme="light"] {
    --bg:#f6f8fa; --surface:#fff; --surface-2:#f0f3f6; --border:#e4e8ee;
    --ink:#151a21; --muted:#69727f; --accent:#0e9c92; --accent-ink:#0b7d75;
    --on-accent:#fff; --online:#16a34a; --warn:#d97706; --down:#dc2626;
    --shadow:0 1px 2px rgba(16,24,32,.05), 0 6px 20px rgba(16,24,32,.05);
  }
  :root[data-theme="dark"] {
    --bg:#0e1217; --surface:#161c23; --surface-2:#1c232c; --border:#262f3a;
    --ink:#e6ebf1; --muted:#8b94a2; --accent:#2dd4bf; --accent-ink:#5eead4;
    --on-accent:#06231f; --online:#34d399; --warn:#fbbf24; --down:#f87171;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 26px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 28px 24px 72px; }

  /* ---- top bar ---------------------------------------------------------------- */
  header.bar {
    display: flex; align-items: center; gap: 16px;
    padding-bottom: 22px; margin-bottom: 26px;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .logo {
    font-family: var(--mono); font-weight: 700; font-size: 22px; letter-spacing: -.5px;
    color: var(--ink);
  }
  .logo .dot { color: var(--accent); }
  .brand .sub {
    text-transform: uppercase; letter-spacing: .16em; font-size: 11px;
    color: var(--muted); font-weight: 600;
  }
  .bar .spacer { flex: 1; }

  .status {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 13px; font-weight: 600;
  }
  .status .led {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--muted); box-shadow: 0 0 0 0 transparent;
  }
  .status[data-state="online"] .led { background: var(--online); animation: pulse 2.4s infinite; }
  .status[data-state="down"]   .led { background: var(--down); }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 color-mix(in srgb, var(--online) 55%, transparent); }
    70%  { box-shadow: 0 0 0 7px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  @media (prefers-reduced-motion: reduce) { .status .led { animation: none !important; } }

  .iconbtn {
    display: inline-grid; place-items: center; width: 34px; height: 34px;
    border-radius: 9px; border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); cursor: pointer; font-size: 15px;
  }
  .iconbtn:hover { color: var(--ink); border-color: var(--accent); }

  /* ---- summary tiles ---------------------------------------------------------- */
  .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 26px; }
  @media (max-width: 620px) { .tiles { grid-template-columns: 1fr; } }
  .tile {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow);
  }
  .tile .label {
    text-transform: uppercase; letter-spacing: .14em; font-size: 10.5px;
    color: var(--muted); font-weight: 700;
  }
  .tile .value {
    font-family: var(--mono); font-variant-numeric: tabular-nums;
    font-size: 27px; font-weight: 600; margin-top: 6px; letter-spacing: -.5px;
  }
  .tile .note { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  /* ---- panel ------------------------------------------------------------------ */
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
  }
  .panel > .head {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 18px; border-bottom: 1px solid var(--border);
  }
  .panel > .head h2 { margin: 0; font-size: 15px; font-weight: 650; }
  .panel > .head .spacer { flex: 1; }
  .updated { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

  .tablewrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 11px 18px; white-space: nowrap; }
  th {
    text-transform: uppercase; letter-spacing: .1em; font-size: 10.5px;
    color: var(--muted); font-weight: 700; background: var(--surface-2);
  }
  td { border-top: 1px solid var(--border); font-size: 14px; }
  tbody tr:hover td { background: var(--surface-2); }
  td.mono, .chip.mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  td.port { font-weight: 650; color: var(--accent-ink); }
  .empty { padding: 30px 18px; text-align: center; color: var(--muted); font-size: 14px; }

  .chip {
    display: inline-block; padding: 2px 9px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border);
    font-size: 12px; color: var(--muted);
  }

  .link {
    background: none; border: none; padding: 4px 6px; cursor: pointer;
    color: var(--muted); font: inherit; font-size: 13px; border-radius: 6px;
  }
  .link:hover { color: var(--down); background: color-mix(in srgb, var(--down) 12%, transparent); }

  /* ---- reserve form ----------------------------------------------------------- */
  form.reserve {
    display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
    padding: 16px 18px; border-top: 1px solid var(--border); background: var(--surface-2);
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    text-transform: uppercase; letter-spacing: .12em; font-size: 10px;
    color: var(--muted); font-weight: 700;
  }
  .field input {
    font: inherit; font-family: var(--mono); font-size: 13.5px;
    padding: 8px 11px; width: 150px;
    background: var(--surface); color: var(--ink);
    border: 1px solid var(--border); border-radius: 8px;
  }
  .field input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  button.primary {
    font: inherit; font-weight: 600; font-size: 13.5px;
    padding: 9px 16px; border-radius: 8px; cursor: pointer;
    background: var(--accent); color: var(--on-accent); border: 1px solid transparent;
  }
  button.primary:hover { background: var(--accent-ink); }
  button.primary:disabled { opacity: .55; cursor: progress; }
  *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .flash {
    min-height: 18px; padding: 0 18px 14px; font-size: 13px; background: var(--surface-2);
  }
  .flash[data-kind="err"] { color: var(--down); }
  .flash[data-kind="ok"]  { color: var(--online); }

  footer { margin-top: 26px; color: var(--muted); font-size: 12.5px; text-align: center; }
  footer code { font-family: var(--mono); }
</style>
</head>
<body>
<div class="wrap">
  <header class="bar">
    <div class="brand">
      <span class="logo">adi<span class="dot">.</span></span>
      <span class="sub">control panel</span>
    </div>
    <span class="spacer"></span>
    <span class="status" id="status" data-state="unknown">
      <span class="led"></span><span id="statusText">connecting…</span>
    </span>
    <button class="iconbtn" id="theme" title="Toggle theme" aria-label="Toggle theme">◐</button>
  </header>

  <section class="tiles">
    <div class="tile">
      <div class="label">Active leases</div>
      <div class="value" id="tLeases">—</div>
      <div class="note">reserved static ports</div>
    </div>
    <div class="tile">
      <div class="label">Allocatable range</div>
      <div class="value" id="tRange">—</div>
      <div class="note" id="tRangeNote">ports handed out from here</div>
    </div>
    <div class="tile">
      <div class="label">Uptime</div>
      <div class="value" id="tUptime">—</div>
      <div class="note" id="tVersion">adi-app</div>
    </div>
  </section>

  <section class="panel">
    <div class="head">
      <h2>Port registry</h2>
      <span class="spacer"></span>
      <span class="updated" id="updated"></span>
    </div>

    <div class="tablewrap">
      <table>
        <thead>
          <tr><th>Service</th><th>Key</th><th>Port</th><th></th></tr>
        </thead>
        <tbody id="rows">
          <tr><td class="empty" colspan="4">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <form class="reserve" id="reserveForm">
      <div class="field">
        <label for="svc">Service</label>
        <input id="svc" name="service" placeholder="frontend" autocomplete="off" required>
      </div>
      <div class="field">
        <label for="key">Port key</label>
        <input id="key" name="key" placeholder="http" autocomplete="off" required>
      </div>
      <button class="primary" type="submit" id="reserveBtn">Reserve port</button>
      <span class="spacer" style="flex:1"></span>
      <span class="chip mono" id="reserved"></span>
    </form>
    <div class="flash" id="flash" data-kind="none"></div>
  </section>

  <footer>
    The Rust backend serves <code>/api</code>; this page is what <code>app.adi</code> shows.
  </footer>
</div>

<script>
  const $ = (id) => document.getElementById(id);

  // ---- theme toggle (persisted; falls back to OS preference) -------------------
  const savedTheme = localStorage.getItem("adi-theme");
  if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);
  $("theme").addEventListener("click", () => {
    const cur = document.documentElement.getAttribute("data-theme")
      || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    const next = cur === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("adi-theme", next);
  });

  // ---- data plumbing -----------------------------------------------------------
  let lastAt = null;

  async function api(path, opts) {
    const res = await fetch(path, opts);
    const text = await res.text();
    const data = text ? JSON.parse(text) : {};
    if (!res.ok) throw new Error(data.error || (res.status + " " + res.statusText));
    return data;
  }

  function setStatus(state, text) {
    $("status").setAttribute("data-state", state);
    $("statusText").textContent = text;
  }

  function fmtUptime(s) {
    if (s < 60) return s + "s";
    if (s < 3600) return Math.floor(s / 60) + "m " + (s % 60) + "s";
    return Math.floor(s / 3600) + "h " + Math.floor((s % 3600) / 60) + "m";
  }

  function flash(kind, msg) {
    const el = $("flash");
    el.setAttribute("data-kind", kind);
    el.textContent = msg || "";
  }

  function renderRows(leases) {
    const tbody = $("rows");
    if (!leases.length) {
      tbody.innerHTML = '<tr><td class="empty" colspan="4">No ports reserved yet — reserve one below.</td></tr>';
      return;
    }
    tbody.innerHTML = "";
    for (const l of leases.slice().sort((a, b) => a.port - b.port)) {
      const tr = document.createElement("tr");
      tr.innerHTML =
        '<td class="mono"></td><td class="mono"></td><td class="mono port"></td>' +
        '<td style="text-align:right"><button class="link">Release</button></td>';
      tr.children[0].textContent = l.service;
      tr.children[1].textContent = l.key;
      tr.children[2].textContent = l.port;
      tr.children[3].querySelector("button").addEventListener("click", () => release(l.service, l.key));
      tbody.appendChild(tr);
    }
  }

  async function refresh() {
    try {
      const [health, ports] = await Promise.all([api("/api/health"), api("/api/ports")]);
      setStatus("online", "online");
      $("tLeases").textContent = ports.leases.length;
      $("tRange").textContent = ports.range.start + "–" + ports.range.end;
      $("tRangeNote").textContent = (ports.range.end - ports.range.start + 1) + " ports · " +
        ports.reserved.length + " reserved bands";
      $("tUptime").textContent = fmtUptime(health.uptime_secs);
      $("tVersion").textContent = health.service + " v" + health.version;
      renderRows(ports.leases);
      lastAt = Date.now();
      tickUpdated();
    } catch (e) {
      setStatus("down", "backend unreachable");
      flash("err", "Couldn't reach the backend: " + e.message);
    }
  }

  function tickUpdated() {
    if (!lastAt) return;
    const secs = Math.round((Date.now() - lastAt) / 1000);
    $("updated").textContent = "updated " + (secs <= 0 ? "just now" : secs + "s ago");
  }

  async function reserve(service, key) {
    $("reserveBtn").disabled = true;
    try {
      const r = await api("/api/ports/reserve", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ service, key }),
      });
      $("reserved").textContent = service + "/" + key + " → :" + r.port;
      flash("ok", "Reserved port " + r.port + " for " + service + "/" + key + ".");
      await refresh();
    } catch (e) {
      flash("err", e.message);
    } finally {
      $("reserveBtn").disabled = false;
    }
  }

  async function release(service, key) {
    try {
      const r = await api("/api/ports/release", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ service, key }),
      });
      flash("ok", r.freed != null ? ("Released port " + r.freed + ".") : "Nothing to release.");
      await refresh();
    } catch (e) {
      flash("err", e.message);
    }
  }

  $("reserveForm").addEventListener("submit", (ev) => {
    ev.preventDefault();
    const service = $("svc").value.trim();
    const key = $("key").value.trim();
    if (service && key) reserve(service, key);
  });

  refresh();
  setInterval(refresh, 4000);
  setInterval(tickUpdated, 1000);
</script>
</body>
</html>
