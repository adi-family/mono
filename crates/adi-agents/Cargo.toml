[package]
name = "adi-agents"
description = "Agent definitions (AgentDef) for the adi platform: a reusable, backend-agnostic spec — backend as executor:what (tmux:claude/process:codex/harness:claude-sdk/harness:adi), system prompt, CLI command scope, model/params, tags — stored one TOML file per agent under ~/.adi/mono/agents. Pure library: the definition/store layer of the adi-agents orchestration spec (docs/adi-agents.md), plus its first run slice — launching tmux-backed agents detached in an adi-agent-<name> tmux session."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
# The shared configurator decides where state lives (the `agents` module dir under
# ~/.adi/mono) and does the atomic TOML (de)serialization of each agent's manifest.
adi-config = { workspace = true }

# The wasm-employee engine behind `wasm:*` backends (`Agents::run_wasm`).
adi-workforce = { workspace = true }

# The manifest is a plain serde/TOML document; `adi-config` does the actual TOML.
serde = { workspace = true }

[lints]
workspace = true
